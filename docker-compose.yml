services:
  netflu-db:
    image: postgres:16
    environment:
      POSTGRES_DB: netflu
      POSTGRES_USER: netflu
      POSTGRES_PASSWORD: netflu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netflu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  falkordb:
    image: falkordb/falkordb:latest
    expose:
      - "6379"
    volumes:
      - falkordb_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  bot:
    image: ghcr.io/damianen/ai-assistant-agent/bot:latest
    labels:
      - "com.centurylinklabs.watchtower.scope=netflu"
    depends_on:
      netflu-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://netflu:netflu@netflu-db:5432/netflu
      REDIS_URL: redis://redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      YOUR_CHAT_ID: ${YOUR_CHAT_ID}
      FALKORDB_HOST: falkordb
      FALKORDB_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - internal
      - ingress-net

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_SCOPE: "netflu"
    labels:
      - "com.centurylinklabs.watchtower.scope=netflu"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  falkordb_data:

networks:
  internal:
    driver: bridge
    internal: true
  ingress-net:
    external: true
